<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h2 style="text-align:center;">Admin Dashboard</h2>

<table>
<tr>
<th>ID</th>
<th>Location</th>
<th>Description</th>
<th>Status</th>
<th>Update</th>
<th>Delete</th>
</tr>

{% for r in reports %}
<tr>
<td>{{ r.id }}</td>
<td>{{ r.location }}</td>
<td>{{ r.description }}</td>
<td class="status">{{ r.status }}</td>

<td>
<a href="/update_status/{{ r.id }}/Pending">Pending</a> |
<a href="/update_status/{{ r.id }}/In Progress">In Progress</a> |
<a href="/update_status/{{ r.id }}/Completed">Completed</a>
</td>

<td>
<a href="/delete/{{ r.id }}">Delete</a>
</td>

</tr>
{% endfor %}

</table>

</body>
</html>
