<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Waste</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="premium-bg">

<div class="overlay"></div>

<div class="center-box">
<div class="glass-card">

<h1 class="brand-title">Invisible Waste</h1>

<h2>Submit Report</h2>
<p class="subtitle">Report Illegal Waste</p>

<form method="POST" enctype="multipart/form-data">

<input type="text" name="location" placeholder="Location" required>

<textarea name="description" placeholder="Describe the issue..." required></textarea>

<input type="file" name="image">

<button class="login-btn">Submit Report</button>

</form>

<p class="switch">
<a href="/my_reports" class="login-btn">View My Reports</a>
</p>

</div>
</div>

</body>
</html>
